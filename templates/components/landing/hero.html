<div class="main-content">
    <div class="hero">
        <small class="mono">// WELCOME TO THE ARCHIVE</small>
        <h1 id="userTitle">Your music.</h1>
        <h2>Fully analyzed.</h2>

        <p class="mono">
            Advanced behavioral analysis of your listening patterns.<br>
            Connecting to AI_CORE for cognitive mapping and emotional profiling.<br>
            No sugarcoating. Just pure insight.
        </p>

        <div class="buttons mono">
            <button class="btn" id="mainBtn">[ START ANALYSIS ]</button>
        </div>
    </div>

    <!-- Collection Selector Overlay -->
    <div id="collectionOverlay" class="collection-overlay" style="display: none;">
        <div class="collection-window">
            <div class="collection-header">
                <span class="mono" id="collectionTitle">// SELECT_DATA_COLLECTION</span>
                <button class="close-btn" onclick="closeCollectionSelector()">[ X ]</button>
            </div>
            
            <div id="collectionList" class="collection-list mono">
                <!-- Populated via JS -->
                <div class="loading-text">FETCHING COLLECTIONS...</div>
            </div>

            <!-- New Status Log Area -->
            <div id="processLog" class="mono" style="display:none; padding: 20px; border-top: 1px solid var(--border-color); font-size: 11px; color: var(--accent-color); background: rgba(0,0,0,0.5); max-height: 150px; overflow-y: auto;">
                <!-- Logs will appear here -->
            </div>
        </div>
    </div>
    

</div>
