<style>
:root {
    --bg-color: #050505;
    --text-color: #e0e0e0;
    --accent-color: #00ff41; /* Classic Terminal Green */
    --dim-text: #888;
    --border-color: #222;
    --card-bg: rgba(10, 10, 10, 0.8);
}

body.light-mode {
    --bg-color: #f5f5f5;
    --text-color: #1a1a1a;
    --accent-color: #008000;
    --dim-text: #666;
    --border-color: #ddd;
    --card-bg: rgba(240, 240, 240, 0.9);
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* SCANLINE EFFECT */
body::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 2000;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.3s;
}

body.light-mode::before {
    opacity: 0.15;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 10;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-bottom: 20px;
}

.theme-toggle {
    cursor: pointer;
    border: 1px solid var(--border-color);
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.2s;
}

.theme-toggle:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent-color);
    border-radius: 50%;
    margin-right: 8px;
    box-shadow: 0 0 8px var(--accent-color);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* MAIN CONTENT */
.main-content {
    display: flex;
    flex-direction: column;
    flex: 1;
    align-items: center;
    justify-content: center;
    text-align: center;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
}

.hero {
    max-width: 800px;
    padding: 20px;
}

.hero small {
    font-size: 10px;
    color: var(--accent-color);
    letter-spacing: 2px;
}

.hero h1 {
    font-size: 32px;
    margin: 15px 0 0;
    color: var(--text-color);
}

.hero h2 {
    font-size: 32px;
    font-style: italic;
    font-weight: 300;
    margin: 0;
    color: var(--dim-text);
}

.hero p {
    margin-top: 20px;
    font-size: 13px;
    color: var(--dim-text);
    line-height: 1.5;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn {
    display: inline-block;
    padding: 14px 24px;
    border: 1px solid var(--accent-color);
    color: var(--accent-color);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    background: var(--accent-color);
    color: var(--bg-color);
    box-shadow: 0 0 20px var(--accent-color);
}

.btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

/* FOOTER */
.footer {
    height: auto;
    padding: 15px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--dim-text);
    border-top: 1px solid var(--border-color);
    margin-top: 20px;
}

/* WATERMARK */
.watermark {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 9px;
    opacity: 0.3;
    z-index: 10000;
}

/* GLOBAL BACKGROUND */
.global-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    opacity: 1; /* Maximize visibility control per icon */
    z-index: 1;
}

.global-bg span {
    position: absolute;
    user-select: none;
}

body.light-mode .global-bg {
    opacity: 0.15;
}

/* COLLECTION OVERLAY */
.collection-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}

.collection-window {
    width: 95%;
    max-width: 600px;
    background: var(--bg-color);
    border: 1px solid var(--accent-color);
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    display: flex;
    flex-direction: column;
    max-height: 90vh;
}

.collection-header {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 255, 65, 0.05);
}

.close-btn {
    background: none;
    border: none;
    color: var(--dim-text);
    cursor: pointer;
    font-size: 12px;
}

.close-btn:hover {
    color: var(--accent-color);
}

.collection-list {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.collection-item {
    display: flex;
    align-items: center;
    padding: 12px;
    border: 1px solid var(--border-color);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.collection-item:hover {
    border-color: var(--accent-color);
    background: rgba(0, 255, 65, 0.05);
}

.collection-img {
    width: 40px;
    height: 40px;
    background: #111;
    margin-right: 12px;
    border: 1px solid var(--border-color);
    object-fit: cover;
}

.collection-info h4 {
    margin: 0;
    font-size: 13px;
    color: var(--text-color);
}

.collection-info p {
    margin: 4px 0 0;
    font-size: 9px;
    color: var(--dim-text);
}

.loading-text {
    text-align: center;
    color: var(--accent-color);
    padding: 30px;
    font-size: 11px;
}

/* DESKTOP ENHANCEMENTS */
@media (min-width: 768px) {
    .app-container {
        padding: 40px;
    }

    .hero {
        padding: 40px;
    }

    .hero h1, .hero h2 {
        font-size: 64px;
    }

    .hero p {
        font-size: 14px;
        margin-top: 30px;
    }

    .buttons {
        flex-direction: row;
        justify-content: center;
        gap: 20px;
    }

    .btn {
        padding: 16px 32px;
        font-size: 14px;
    }

    .footer {
        flex-direction: row;
        justify-content: space-between;
        font-size: 10px;
    }

    .collection-item:hover {
        transform: translateX(10px);
    }
}

</style>
