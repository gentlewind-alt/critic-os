<!-- DOSSIER OVERLAY (PHASE 2) -->
<div id="dossierOverlay">
    <div class="dossier-card">
        <div class="dossier-left">
            <div class="dossier-user">
                <img src="https://placehold.co/80" alt="Profile" class="dossier-avatar" id="dossierAvatar">
                <div>
                    <div class="mono" style="font-size: 10px; color: var(--accent-color);">// SUBJECT_IDENTIFIED</div>
                    <div class="mono" style="font-size: 14px; font-weight: bold;" id="dossierName">USER_NULL</div>
                </div>
            </div>
            
            <div>
                <div class="mono" style="font-size: 10px; color: var(--accent-color); margin-bottom: 5px;">// LISTENING_ARCHETYPE</div>
                <div class="archetype-title" id="dossierArchetype">ARCHETYPE_PENDING</div>
            </div>

            <div class="dossier-stats mono" id="dossierStats">
                <!-- Populated via JS -->
            </div>
        </div>

        <div class="dossier-right">
            <div class="mono" style="font-size: 10px; color: var(--accent-color); margin-bottom: 10px;">// PSYCHOLOGICAL_VERDICT</div>
            <div class="dossier-verdict" id="dossierVerdict">Generating final cognitive mapping...</div>
            
            <div class="mono" style="font-size: 10px; color: var(--accent-color); margin-bottom: 5px;">// RECENT_EXPOSURES</div>
            <div class="dossier-gallery" id="dossierGallery">
                <!-- Populated via JS -->
            </div>
        </div>

        <div class="dossier-footer mono">
            CRITIC_OS // VER_2.0 // HIGHLY_CLASSIFIED
        </div>
    </div>
</div>

<button class="share-trigger mono" id="shareBtn" onclick="toggleDossier()">
    [ SHARE_MY_DOSSIER ]
</button>

<div id="tuneModal" class="mono">
    <div id="tuneModalTitle" style="color: #ff9d00; font-size: 14px;">// SYSTEM_PROMPT_OVERRIDE</div>
    
    <div id="roastTuneArea">
        <textarea id="promptOverride" placeholder="Enter custom roast instructions..."></textarea>
    </div>
    
    <div id="profileTuneArea" style="display: none;">
        <textarea id="profilePromptOverride" placeholder="Enter custom profile instructions..."></textarea>
    </div>

    <div class="modal-btns">
        <div class="theme-toggle" onclick="closeTuneModal()">[ CANCEL ]</div>
        <div class="theme-toggle" onclick="saveTuneModal()" style="color: #ff9d00; border-color: #ff9d00;">[ APPLY_CHANGES ]</div>
    </div>
</div>

<div id="bootOverlay">
    <div class="boot-sequence">
        <div id="bootLog"></div>
        <div class="boot-progress">
            <div class="boot-bar" id="bootBar"></div>
        </div>
    </div>
</div>
