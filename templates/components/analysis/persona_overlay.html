<div id="personaOverlay">
    <div id="personaBg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; opacity: 0.2;"></div>
    <div class="mono" style="color: var(--accent-color); font-size: 14px; position: relative; z-index: 1;">// SELECT ANALYSIS PERSONA</div>
    <div class="persona-grid mono">
        <div class="persona-card" onclick="selectPersona('normal')">
            <h3>NORMAL</h3>
            <p>Honest Best Friend</p>
        </div>
        <div class="persona-card" onclick="selectPersona('cat')">
            <h3>CAT</h3>
            <p>Caring House Cat</p>
        </div>
        <div class="persona-card" onclick="selectPersona('grandpa')">
            <h3>GRANDPA</h3>
            <p>Old-Fashioned Grump</p>
        </div>
    </div>
    <div style="margin-top: 40px; display: flex; gap: 20px;">
        <div class="theme-toggle" id="tuneBtn" onclick="openTuneModal('roast')" style="color: #ff9d00; border-color: #ff9d00; padding: 10px 20px;">[ TUNE ROAST PROMPT ]</div>
        <div class="theme-toggle" id="tuneProfileBtn" onclick="openTuneModal('profile')" style="color: #ff9d00; border-color: #ff9d00; padding: 10px 20px;">[ TUNE PROFILE PROMPT ]</div>
    </div>
</div>
