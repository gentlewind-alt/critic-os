<div class="profile-card" id="profileCard">
    <div class="profile-card-header mono">// BEHAVIORAL_PROFILE_ANALYSIS</div>
    <div class="profile-card-body">
        <img src="" alt="Avatar" class="profile-avatar" id="profileAvatar">
        <div class="profile-text-content">
            <span class="text-content" id="profileOutput"></span><span class="cursor"></span>
            <div class="profile-interaction" id="profileInteraction">
                <div class="profile-q-text" id="profileQuestionText" style="margin-bottom: 10px; color: var(--accent);">...</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="profile-btn" id="profileOptionA" onclick="handleProfileResponse('A')">[ YES ]</button>
                    <button class="profile-btn" id="profileOptionB" onclick="handleProfileResponse('B')">[ NO ]</button>
                </div>
            </div>
        </div>
    </div>
</div>
