<style>
:root {
    --bg-color: #050505;
    --text-color: #e0e0e0;
    --accent-color: #00ff41; /* Classic Terminal Green */
    --dim-text: #888;
    --border-color: #222;
    --card-bg: rgba(10, 10, 10, 0.8);
    --msg-bg: rgba(255, 255, 255, 0.05);
    --roast-bg: rgba(255, 255, 255, 0.02);
    --hover-bg: rgba(0, 255, 65, 0.05);
    --hover-shadow: rgba(0, 255, 65, 0.2);
}

body.light-mode {
    --bg-color: #f5f5f5;
    --text-color: #1a1a1a;
    --accent-color: #ff9d00; /* Matching Tune Prompt Orange */
    --dim-text: #666;
    --border-color: #ddd;
    --card-bg: rgba(240, 240, 240, 0.9);
    --msg-bg: rgba(0, 0, 0, 0.05);
    --roast-bg: rgba(0, 0, 0, 0.02);
    --hover-bg: rgba(255, 255, 255, 0.05);
    --hover-shadow: rgba(0, 128, 0, 0.1);
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* SCANLINE EFFECT */
body::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 5000;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.3s;
}

body.light-mode::before {
    opacity: 0.15;
}

/* LOADING OVERLAY */
#bootOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-color);
    z-index: 4000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.boot-sequence {
    width: 400px;
    font-size: 12px;
    color: var(--accent-color);
    line-height: 1.6;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}

.boot-progress {
    width: 100%;
    height: 2px;
    background: var(--border-color);
    margin-top: 20px;
    position: relative;
    overflow: hidden;
}

.boot-bar {
    position: absolute;
    top: 0; left: 0; height: 100%;
    background: var(--accent-color);
    width: 0%;
    box-shadow: 0 0 10px var(--accent-color);
}

/* PERSONA SELECTION */
#personaOverlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg-color);
    z-index: 4500;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.persona-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 40px;
}

.persona-card {
    padding: 20px;
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
}

.persona-card:hover {
    border-color: var(--accent-color);
    background: var(--hover-bg);
    box-shadow: 0 0 15px var(--hover-shadow);
}

.persona-card h3 {
    margin: 0 0 10px 0;
    font-size: 14px;
    color: var(--accent-color);
}

.persona-card p {
    margin: 0;
    font-size: 11px;
    color: var(--dim-text);
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: scale(1.02);
    transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.app-container.ready {
    opacity: 1;
    transform: scale(1);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-bottom: 20px;
}

.theme-toggle {
    cursor: pointer;
    border: 1px solid var(--border-color);
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.2s;
}

.theme-toggle:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent-color);
    border-radius: 50%;
    margin-right: 8px;
    box-shadow: 0 0 8px var(--accent-color);
    animation: pulse 1.5s infinite;
}

#activePersona, #sessId {
    color: var(--accent-color);
    font-weight: bold;
    text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
}

body.light-mode #activePersona, body.light-mode #sessId {
    text-shadow: none;
}

@keyframes pulse {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* MAIN CONTENT */
.main-content {
    display: flex;
    flex: 1;
    gap: 20px;
    overflow: hidden;
}

/* CHAT AREA */
.chat-window {
    flex: 2;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
}

.messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-color) transparent;
}

.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
    word-wrap: break-word;
    overflow-wrap: break-word;
    height: auto;
    display: block;
}

.message.system {
    align-self: flex-start;
    background: transparent;
    border-left: 2px solid var(--dim-text);
    color: var(--dim-text);
    font-size: 12px;
}

.message.ai {
    align-self: flex-start;
    background: var(--msg-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    padding-left: 45px;
}

.message.ai::before {
    content: "AI";
    position: absolute;
    left: 10px;
    top: 12px;
    width: 24px;
    height: 24px;
    background: var(--accent-color);
    color: var(--bg-color);
    font-size: 10px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
}

.message.profile {
    align-self: flex-start;
    background: var(--msg-bg);
    border: 1px solid var(--accent-color);
    color: var(--text-color);
    animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    padding-left: 45px;
}

.message.profile::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 12px;
    width: 28px;
    height: 28px;
    background-image: var(--msg-icon, url('https://placehold.co/28?text=U'));
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    border: 1px solid var(--accent-color);
}

.message.roast {
    align-self: flex-start;
    background: var(--roast-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-color);
    border-left: 4px solid var(--accent-color);
    animation: slideInRoast 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    padding-left: 48px; /* Slightly increased for icon clearance */
}

.message.roast::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 12px;
    width: 28px;
    height: 28px;
    background-image: var(--msg-icon, url('https://placehold.co/28'));
    background-size: cover;
    background-position: center;
    border-radius: 4px;
    border: 1px solid var(--border-color);
}

body.light-mode .message.roast {
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-left: 4px solid var(--accent-color);
}

@keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes slideInRoast {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

.cursor {
    display: inline-block;
    width: 8px;
    height: 15px;
    background: var(--accent-color);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* Ensure only one cursor (the last one) is visible if multiple exist */
.message .cursor {
    display: none;
}
.message:last-child .cursor {
    display: inline-block;
}

/* SIDEBAR / COVERFLOW */
.sidebar {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.cover-display {
    flex: 1;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    transition: background 0.3s, border-color 0.3s;
}

#activeCover {
    width: 80%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    backface-visibility: hidden;
    will-change: transform, filter;
}

.song-info {
    text-align: center;
    margin-top: 20px;
}

.song-info h3 { margin: 0; font-size: 18px; }
.song-info p { margin: 5px 0; color: var(--dim-text); font-size: 14px; }

/* FOOTER */
.footer {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    color: var(--dim-text);
    border-top: 1px solid var(--border-color);
    margin-top: 20px;
}

/* WATERMARK */
.watermark {
    position: fixed;
    top: 15px;
    left: 20px;
    font-size: 10px;
    opacity: 0.3;
    z-index: 10000;
}

/* GLITCH CLASS */
.glitch {
    animation: glitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
}
/* TUNE MODAL */
#tuneModal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%;
    max-width: 600px;
    background: var(--bg-color);
    border: 1px solid #ff9d00;
    padding: 20px;
    z-index: 6000;
    display: none;
    flex-direction: column;
    gap: 15px;
    box-shadow: 0 0 30px rgba(255, 157, 0, 0.2);
}

#tuneModal textarea {
    width: 100%;
    height: 300px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px;
    resize: none;
}

#tuneModal .modal-btns {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
/* GLOBAL BACKGROUND */
.global-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    opacity: 1;
    z-index: 1;
}

.global-bg span {
    position: absolute;
    user-select: none;
}

body.light-mode .global-bg {
    opacity: 0.15;
}

/* ROASTCARD WINDOW */
.roastcard-window {
    width: 100%;
    margin-bottom: 30px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: none; /* Hidden until roast starts */
    flex-direction: column;
    animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.roastcard-header {
    height: 30px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    border-bottom: 1px solid var(--border-color);
}

.roastcard-header .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.roastcard-header .dot.close { background: #ff5f56; }
.roastcard-header .dot.minimize { background: #ffbd2e; }
.roastcard-header .dot.maximize { background: #27c93f; }

.roastcard-body {
    padding: 30px;
    font-size: 24px;
    line-height: 1.4;
    min-height: 150px;
    color: var(--accent-color);
    position: relative;
    transition: opacity 1.5s ease; /* Slowed down from 0.8s for smoother transition */
}

.roastcard-body.fade-out {
    opacity: 0;
}

.roastcard-body .cursor {
    width: 12px;
    height: 24px;
}

/* QUESTION MODULE */
.question-module {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
    display: none;
    animation: fadeIn 0.5s ease;
}

.question-text {
    font-size: 16px;
    color: var(--accent-color);
    margin-bottom: 15px;
    font-style: italic;
}

.question-options {
    display: flex;
    gap: 15px;
}

.option-btn {
    padding: 8px 20px;
    border: 1px solid var(--accent-color);
    background: transparent;
    color: var(--accent-color);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.option-btn:hover:not(:disabled) {
    background: var(--accent-color);
    color: var(--bg-color);
}

.option-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* DE-CLUTTER DURING ROAST */
#messageContainer.roasting-active .message.system,
#messageContainer.roasting-active .message.profile {
    display: none;
}

/* COLLECTIVE GRID */
.collective-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 25px;
    padding: 30px;
    width: 100%;
    box-sizing: border-box;
    animation: slideIn 1s cubic-bezier(0.16, 1, 0.3, 1);
}

.grid-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-color);
    background: #000;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
}

.grid-item:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 30px rgba(0,255,65,0.2);
    border-color: var(--accent-color);
}

.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: filter 0.4s ease, transform 0.4s ease;
}

.grid-item:hover img {
    filter: brightness(0.5) blur(4px);
    transform: scale(1.1);
}

.grid-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    padding: 20px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 2;
    background: rgba(255, 252, 240, 0.95); /* Warm White Background */
}

.grid-item:hover .grid-overlay {
    opacity: 1;
}

.grid-overlay h4 {
    font-size: 14px;
    margin: 0 0 8px 0;
    color: #1a1a1a; /* Darker text for contrast */
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}

.grid-overlay p {
    font-size: 12px;
    line-height: 1.4;
    color: #333; /* Darker text for contrast */
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* PROFILE CARD */
.profile-card {
    width: 100%;
    margin-bottom: 30px;
    background: var(--card-bg);
    border: 1px solid var(--accent-color);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
    display: none;
    flex-direction: column;
    animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.profile-card-header {
    height: 35px;
    background: rgba(0, 255, 65, 0.1);
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid var(--accent-color);
    font-size: 12px;
    color: var(--accent-color);
    letter-spacing: 1px;
}

.profile-card-body {
    padding: 30px;
    display: flex;
    gap: 25px;
    align-items: flex-start;
}

.profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--accent-color);
    object-fit: cover;
}

.profile-text-content {
    flex: 1;
    font-size: 18px;
    line-height: 1.5;
    color: var(--text-color);
}

.profile-interaction {
    margin-top: 20px;
    display: none;
    gap: 15px;
}

.profile-btn {
    padding: 8px 20px;
    border: 1px solid var(--accent-color);
    background: transparent;
    color: var(--accent-color);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
}

.profile-btn:hover {
    background: var(--accent-color);
    color: var(--bg-color);
}

</style>
