class TokenQueue {
    constructor(element, callback) {
        this.element = element;
        this.callback = callback;
        this.queue = "";
        this.isRunning = false;
        this.isFinished = false; 
        this.speed = 40; 
        this.timeoutId = null;
    }

    add(text, instant = false) {
        if (instant) {
            this.element.textContent += text;
            return;
        }
        this.queue += text;
        if (!this.isRunning) {
            this.process();
        }
    }

    process() {
        if (this.timeoutId) clearTimeout(this.timeoutId);
        
        if (this.queue.length > 0) {
            this.isRunning = true;
            this.element.textContent += this.queue.charAt(0);
            this.queue = this.queue.substring(1);
            scrollToBottom();
            this.timeoutId = setTimeout(() => this.process(), this.speed);
        } else {
            this.isRunning = false;
            this.timeoutId = null;
            if (this.isFinished && this.callback) this.callback();
        }
    }

    finish() {
        this.isFinished = true;
        if (!this.isRunning && this.callback) this.callback();
    }

    stop() {
        // Cancel pending loop
        if (this.timeoutId) clearTimeout(this.timeoutId);
        this.timeoutId = null;
        
        // Dump remaining queue instantly
        this.element.textContent += this.queue;
        this.queue = "";
        this.isRunning = false;
        this.isFinished = true;
        if (this.callback) this.callback();
    }
    
    cancel() {
        // Hard stop without dumping queue
        if (this.timeoutId) clearTimeout(this.timeoutId);
        this.timeoutId = null;
        this.queue = "";
        this.isRunning = false;
    }
}

/**
 * Utility to detect potential "gibberish" (interleaved strings)
 * by checking for unrealistic word structures or high symbol density.
 */
function isPotentialGibberish(text) {
    if (!text || text.length < 20) return false;
    
    // Check for high density of short word fragments or mixed casing
    const words = text.split(/\s+/);
    if (words.length < 3) return false;
    
    // An interleaved string often has words with non-standard characters in middle
    const weirdWords = words.filter(w => /[a-z][A-Z]/.test(w) || /['][a-zA-Z]/.test(w.substring(1))).length;
    const ratio = weirdWords / words.length;
    
    return ratio > 0.3; // If more than 30% of words look "interleaved"
}

        bootLog.appendChild(step);

// Helper to sync typing animations
function waitForQueue() {
    return new Promise(resolve => {
        if (!currentTokenQueue || !currentTokenQueue.isRunning) {
            resolve();
            return;
        }
        const check = setInterval(() => {
            if (!currentTokenQueue || !currentTokenQueue.isRunning) {
                clearInterval(check);
                resolve();
            }
        }, 100);
    });
}

async function handleProfileResponse(choice) {
    const pInteraction = document.getElementById('profileInteraction');
    const pOutput = document.getElementById('profileOutput');
    const qText = document.getElementById('profileQuestionText').textContent;
    const optionText = choice === 'A' ? document.getElementById('profileOptionA').textContent : document.getElementById('profileOptionB').textContent;
    
    pInteraction.style.display = 'none';
    pOutput.textContent = '>> RE-GROUNDING AI_CORE_LOGIC...';
    
    const state = `was asked "${qText}" and answered: "${optionText}"`;
    
    try {
        const response = await fetch('/stream-profile-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                songs: enrichedSongs,
                persona: selectedPersona,
                state: state,
                profile_custom_prompt: sessionStorage.getItem('os_profile_custom_prompt')
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        pOutput.textContent = ''; 
        currentTokenQueue = new TokenQueue(pOutput, () => {
            // After typing, wait a bit then fade out card
            setTimeout(() => {
                const pCard = document.getElementById('profileCard');
                pCard.style.transition = 'opacity 1s ease';
                pCard.style.opacity = '0';
                setTimeout(() => {
                    pCard.style.display = 'none';
                    pCard.style.opacity = '1'; 
                    isWaitingForProfileResponse = false;
                }, 1000);
            }, 3000);
        });

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n\n');
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = JSON.parse(line.slice(6));
                    if (data.type === 'profile_token') {
                        currentTokenQueue.add(data.text);
                    }
                }
            }
        }
        currentTokenQueue.finish();
        
    } catch (e) {
        console.error("Profile answer submission failed:", e);
        pOutput.textContent = "[SYSTEM ERROR: FAILED TO RE-GROUND PROFILE]";
        isWaitingForProfileResponse = false;
    }
}

let isWaitingForProfileResponse = false;

let isWaitingForAnswer = false;
let interactionResolver = null;

async function submitAnswer(choice) {
    const qModule = document.getElementById('questionModule');
    const songIndex = parseInt(qModule.dataset.songIndex);
    const song = enrichedSongs[songIndex];
    const qText = document.getElementById('questionText').textContent;
    const optionText = choice === 'A' ? document.getElementById('optionA').textContent : document.getElementById('optionB').textContent;
    
    // Disable buttons and show loading
    document.getElementById('optionA').disabled = true;
    document.getElementById('optionB').disabled = true;
    
    const displayContent = document.getElementById('activeRoastDisplay').querySelector('.text-content');
    displayContent.textContent = '>> RE-GROUNDING AI_CORE_LOGIC...';
    
    // Map choice to state accurately
    const state = `User was asked: "${qText}" and answered: "${optionText}"`;
    
    try {
        const response = await fetch('/stream-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                song: song,
                persona: selectedPersona,
                state: state,
                custom_prompt: sessionStorage.getItem('os_custom_prompt')
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        
        displayContent.textContent = ''; // Clear for new roast
        currentTokenQueue = new TokenQueue(displayContent);

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n\n');
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const data = JSON.parse(line.slice(6));
                    if (data.type === 'roast_token') {
                        currentTokenQueue.add(data.text);
                    }
                }
            }
        }
        
        // NEW: Mark queue as finished so waitForQueue can resolve
        currentTokenQueue.finish();
        
        await waitForQueue();
        
        // Update completedRoasts with the regrounded text
        if (!completedRoasts[songIndex]) {
            completedRoasts[songIndex] = {
                track: song ? song.track_name : 'Unknown',
                artist: song ? song.artist_name : 'Unknown',
                image: song ? song.album_image : 'https://placehold.co/300',
                roast: displayContent.textContent
            };
        } else {
            completedRoasts[songIndex].roast = displayContent.textContent;
        }
        
        // Remove question
        qModule.style.display = 'none';
        isWaitingForAnswer = false;
        if (interactionResolver) interactionResolver();

    } catch (e) {
        console.error("Answer submission failed:", e);
        displayContent.textContent = "[SYSTEM ERROR: FAILED TO RE-GROUND]";
        isWaitingForAnswer = false;
        if (interactionResolver) interactionResolver();
    }
}

async function startStreaming() {
    const colName = sessionStorage.getItem('os_collection_name') || 'your collection';
    addMessage('system', `>> INITIATING COMPREHENSIVE PROFILE CRITIQUE FOR [${colName.toUpperCase()}] (${selectedPersona.toUpperCase()} MODE)...`);
    const coreMsg = addMessage('system', '>> CONNECTING TO AI_CORE_MODULE...');
    coreMsg.id = 'coreStatusMsg';
    
    const customPrompt = sessionStorage.getItem('os_custom_prompt');
    const profileCustomPrompt = sessionStorage.getItem('os_profile_custom_prompt');
    
    try {
        const response = await fetch('/stream/123', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                songs: enrichedSongs,
                persona: selectedPersona,
                custom_prompt: customPrompt,
                profile_custom_prompt: profileCustomPrompt,
                collection_name: colName
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n\n');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));

                        // Check if we should skip this event during resume
                        if (isResuming) {
                            if (data.type === 'profile_end') {
                                if (lastProfileComplete) continue;
                                else isResuming = false; 
                            }
                            if (data.type === 'profile_start' || data.type === 'profile_token') {
                                if (lastProfileComplete) continue;
                            }
                            
                            if (data.type === 'roast_start' || data.type === 'roast_token' || data.type === 'roast_end') {
                                if (data.index <= lastRoastIndex) continue;
                                else isResuming = false; 
                            }

                            if (data.type === 'log' || data.type === 'dialog' || data.type === 'coverflow' || data.type === 'emotion') {
                                continue; 
                            }
                        }

                        // 🔥 SYNC POINT: Wait for current animation to finish before starting new sections
                        if (['roast_start', 'roast_end', 'profile_start', 'coverflow', 'final'].includes(data.type)) {
                            await waitForQueue();
                        }

                        // NEW SYNC POINT: Wait for profile interaction
                        if (data.type === 'profile_start') {
                            isWaitingForProfileResponse = true;
                        }

                        await handleEvent(data); // Changed to await

                        if (data.type === 'profile_end') {
                            // Wait until the user clicks Yes/No and the follow-up text finishes
                            while (isWaitingForProfileResponse) {
                                await new Promise(r => setTimeout(r, 200));
                            }
                        }
                        
                        // Save event to session
                        sessionEvents.push(data);
                        sessionStorage.setItem('os_events', JSON.stringify(sessionEvents));
                    } catch (e) {
                        console.warn("Skipping partial data chunk");
                    }
                }
            }
        }
    } catch (err) {
        console.error('Stream error:', err);
        addMessage('system', '>> CRITICAL ERROR: STREAM DISCONNECTED');
    }
}

async function handleEvent(event, isReplay = false) {
    console.log("OS_EVENT_INBOUND:", event);
    
    switch (event.type) {
        case 'log':
            addLog(event.content);
            break;
        
        case 'dialog':
            addMessage('ai', event.content, isReplay);
            break;

        case 'profile_start':
            // 🔥 UPDATE DISPLAY WITH USER INFO
            const userImg = sessionStorage.getItem('userImage');
            const userName = sessionStorage.getItem('userName') || 'USER';
            if (userImg) {
                updateDisplay({
                    image: userImg,
                    track: "BEHAVIORAL PROFILE",
                    artist: userName.toUpperCase()
                });
            }
            
            // SHOW PROFILE CARD
            const pCard = document.getElementById('profileCard');
            const pAvatar = document.getElementById('profileAvatar');
            const pOutput = document.getElementById('profileOutput');
            const pInteraction = document.getElementById('profileInteraction');
            
            pCard.style.display = 'flex';
            pAvatar.src = userImg || 'https://placehold.co/80';
            pOutput.textContent = '';
            pInteraction.style.display = 'none';
            
            // Cleanup any existing queue to prevent overlaps
            if (currentTokenQueue) currentTokenQueue.stop();

            // RENDER AI QUESTION
            if (event.question_module && !isReplay) {
                const qText = document.getElementById('profileQuestionText');
                const btnA = document.getElementById('profileOptionA');
                const btnB = document.getElementById('profileOptionB');
                
                if (qText) qText.textContent = event.question_module.question;
                if (btnA) btnA.textContent = event.question_module.options.A;
                if (btnB) btnB.textContent = event.question_module.options.B;
            }

            currentTokenQueue = new TokenQueue(pOutput, () => {
                // Show buttons when done typing the profile roast
                pInteraction.style.display = 'flex';
            });
            break;

        case 'profile_token':
            if (currentTokenQueue) {
                currentTokenQueue.add(event.text, isReplay);
            }
            break;

        case 'profile_end':
            lastProfileComplete = true;
            if (currentTokenQueue) {
                if (isReplay) {
                    currentTokenQueue.stop();
                    currentTokenQueue = null;
                } else {
                    // Mark as finished so waitForQueue can resolve
                    currentTokenQueue.finish();
                }
            }
            break;

        case 'coverflow':
            updateDisplay(event.song);
            break;

        case 'emotion':
            if (event.data && Array.isArray(event.data)) {
                spectrumText.textContent = event.data.join(', ').toUpperCase();
            } else {
                spectrumText.textContent = "NEUTRAL";
            }
            confidenceText.textContent = (event.confidence * 100).toFixed(1) + '%';
            break;

        case 'roast_start':
            const songData = enrichedSongs[event.index];
            let songImg = null;
            
            // Set waiting state
            if (event.question_module && !isReplay) {
                isWaitingForAnswer = true;
            }

            // Activate roasting mode to hide clutter
            messageContainer.classList.add('roasting-active');

            if (songData) {
                songImg = songData.album_image;
                updateDisplay({
                    image: songData.album_image,
                    track: songData.track_name,
                    artist: songData.artist_name,
                    emotions: songData.Emotion,
                    confidence: songData.emotion_analysis?.emotions_detected
                });
            }
            
            // Show Roastcard and reset
            const roastCard = document.getElementById('roastCard');
            const displayBody = document.getElementById('activeRoastDisplay');
            const displayContent = displayBody.querySelector('.text-content');
            const qModule = document.getElementById('questionModule');
            const qText = document.getElementById('questionText');
            
            roastCard.style.display = 'flex';
            displayBody.classList.remove('fade-out');
            displayContent.textContent = '';

            // Cleanup any existing queue to prevent overlaps
            if (currentTokenQueue) currentTokenQueue.stop();

            // RENDER QUESTION MODULE
            if (event.question_module && !isReplay) {
                qModule.style.display = 'block';
                qText.textContent = event.question_module.question;
                qModule.dataset.phrase = event.question_module.phrase;
                qModule.dataset.songIndex = event.index;
                
                // Keep buttons disabled initially (wait for typing to finish)
                document.getElementById('optionA').disabled = true;
                document.getElementById('optionB').disabled = true;
            } else {
                qModule.style.display = 'none';
            }
            
            currentTokenQueue = new TokenQueue(displayContent, () => {
                // Enable buttons when done typing the roast/question
                if (event.question_module && !isReplay) {
                    document.getElementById('optionA').disabled = false;
                    document.getElementById('optionB').disabled = false;
                }
            });
            break;

        case 'roast_token':
            if (currentTokenQueue) {
                currentTokenQueue.add(event.text, isReplay);
            }
            break;

        case 'roast_end':
            lastRoastIndex = event.index;
            
            if (currentTokenQueue) {
                if (isReplay) {
                    currentTokenQueue.stop();
                    currentTokenQueue = null;
                } else {
                    // Mark as finished so waitForQueue can resolve
                    currentTokenQueue.finish();

                    // Force a wait for the typewriter to finish
                    await waitForQueue();
                    
                    // 🔥 SYNC: If this song had a question, wait for user to answer before proceeding
                    if (isWaitingForAnswer) {
                        console.log("ROAST_END: BLOCKING FOR INTERACTION...");
                        await new Promise(resolve => {
                            interactionResolver = resolve;
                        });
                        console.log("ROAST_END: INTERACTION COMPLETE, PROCEEDING.");
                    }
                    
                    // READ DELAY: Wait 5 seconds so user can actually READ the roast
                    await new Promise(r => setTimeout(r, 5000));
                    
                    const displayBody = document.getElementById('activeRoastDisplay');
                    const fullText = displayBody.querySelector('.text-content').textContent;
                    
                    // CAPTURE FOR COLLECTIVE LIST
                    const song = enrichedSongs[event.index];
                    completedRoasts[event.index] = {
                        track: song ? song.track_name : 'Unknown',
                        artist: song ? song.artist_name : 'Unknown',
                        image: song ? song.album_image : 'https://placehold.co/300',
                        roast: fullText
                    };

                    displayBody.classList.add('fade-out');
                    
                    // Wait for fade-out animation to complete (1.5s as per CSS)
                    await new Promise(r => setTimeout(r, 1500));
                    
                    currentTokenQueue = null;
                    interactionResolver = null;
                }
            }
            break;

        case 'final_start':
            isCompleted = true;
            messageContainer.classList.remove('roasting-active');
            
            const finalRoastCard = document.getElementById('roastCard');
            if (finalRoastCard) finalRoastCard.style.display = 'none';

            // Start final message
            const finalMsg = addMessage('profile', '');
            const finalContent = finalMsg.querySelector('.text-content');
            currentTokenQueue = new TokenQueue(finalContent);
            
            if (event.profile) {
                spectrumText.textContent = event.profile.spectrum.join(', ').toUpperCase();
                confidenceText.textContent = (event.profile.confidence * 100).toFixed(1) + '%';
            }
            break;

        case 'final_token':
            if (currentTokenQueue) {
                currentTokenQueue.add(event.text, isReplay);
            }
            break;

        case 'final_end':
            if (currentTokenQueue) {
                if (isReplay) {
                    currentTokenQueue.stop();
                } else {
                    currentTokenQueue.finish();
                    await waitForQueue();
                }
                currentTokenQueue = null;
            }

            // RENDER THE GRID
            const grid = document.createElement('div');
            grid.className = 'collective-grid';
            
            completedRoasts.forEach(item => {
                if (!item) return;
                const gridItem = document.createElement('div');
                gridItem.className = 'grid-item';
                gridItem.innerHTML = `
                    <img src="${item.image}" alt="${item.track}">
                    <div class="grid-overlay">
                        <h4>${item.track}</h4>
                        <p>${item.roast}</p>
                    </div>
                `;
                grid.appendChild(gridItem);
            });

            messageContainer.appendChild(grid);
            
            // ADD COPY BUTTON FOR FINAL VERDICT
            const finalMsgs = messageContainer.querySelectorAll('.message.profile .text-content');
            const lastFinalMsg = finalMsgs[finalMsgs.length - 1];
            if (lastFinalMsg) {
                const copyBtn = document.createElement('div');
                copyBtn.className = 'theme-toggle';
                copyBtn.style.marginTop = '15px';
                copyBtn.style.display = 'inline-block';
                copyBtn.style.fontSize = '10px';
                copyBtn.textContent = '[ COPY FINAL VERDICT ]';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(lastFinalMsg.textContent);
                    copyBtn.textContent = '[ COPIED! ]';
                    setTimeout(() => copyBtn.textContent = '[ COPY FINAL VERDICT ]', 2000);
                };
                messageContainer.appendChild(copyBtn);
            }

            addMessage('system', '>> ANALYSIS_COMPLETE. HOVER OVER COVERS FOR INDIVIDUAL CRITIQUES.');
            break;
    }
}

function addMessage(type, text, instant = false, icon = null) {
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    
    if (icon) {
        msg.style.setProperty('--msg-icon', `url('${icon}')`);
    }
    
    if (type === 'roast' || type === 'ai' || type === 'profile') {
        msg.innerHTML = '<span class="text-content"></span><span class="cursor"></span>';
        const content = msg.querySelector('.text-content');
        if (text) {
            const tq = new TokenQueue(content, () => {
                const cursor = msg.querySelector('.cursor');
                if (cursor) cursor.remove();
            });
            tq.add(text, instant);
        }
    } else {
        msg.textContent = text;
    }
    
    messageContainer.appendChild(msg);
    scrollToBottom();
    return msg;
}

function addLog(text) {
    const log = document.createElement('div');
    log.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
    logStream.appendChild(log);
    const parent = logStream.parentElement;
    parent.scrollTop = parent.scrollHeight;
}

function updateDisplay(song) {
    activeCover.src = song.image || 'https://placehold.co/300';
    activeTitle.textContent = song.track;
    activeArtist.textContent = song.artist;
    
    if (song.emotions) {
        spectrumText.textContent = song.emotions.join(', ').toUpperCase();
    }
    if (song.confidence) {
        const probs = Object.values(song.confidence);
        const maxProb = probs.length > 0 ? Math.max(...probs) : 0;
        confidenceText.textContent = (maxProb * 100).toFixed(1) + '%';
    }
    
    activeCover.classList.add('glitch');
    setTimeout(() => activeCover.classList.remove('glitch'), 400);
}

function typeWriter(element, text, callback, i = 0) {
    // Deprecated, using TokenQueue instead
    const tq = new TokenQueue(element, callback);
    tq.add(text);
}

function scrollToBottom() {
    messageContainer.scrollTop = messageContainer.scrollHeight;
}
</script>
