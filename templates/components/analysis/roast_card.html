<div class="roastcard-window" id="roastCard">
    <div class="roastcard-header">
        <span class="dot close"></span>
        <span class="dot minimize"></span>
        <span class="dot maximize"></span>
    </div>
    <div class="roastcard-body mono" id="activeRoastDisplay">
        <span class="text-content"></span><span class="cursor"></span>
        
        <!-- QUESTION MODULE -->
        <div class="question-module" id="questionModule">
            <div class="question-text" id="questionText">...</div>
            <div class="question-options">
                <button class="option-btn" id="optionA" onclick="submitAnswer('A')">[ YES ]</button>
                <button class="option-btn" id="optionB" onclick="submitAnswer('B')">[ NO ]</button>
            </div>
        </div>
    </div>
</div>
